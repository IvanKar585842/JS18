<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .gallery {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 0;
      margin: 0;
      justify-content: center;
    }

    .gallery-item {
      flex: 1 1 200px;
      max-width: 320px;
    }

    .gallery-img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <section>
    <h1>Задание 1</h1>
    <ul id="categories">
      <li class="item">
        <h2>Животные</h2>
        <ul>
          <li>Кот</li>
          <li>Хомяк</li>
          <li>Лошадь</li>
          <li>Попугай</li>
        </ul>
      </li>
      <li class="item">
        <h2>Продукты</h2>
        <ul>
          <li>Хлеб</li>
          <li>Петрушка</li>
          <li>Сыр</li>
        </ul>
      </li>
      <li class="item">
        <h2>Технологии</h2>
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
          <li>React</li>
          <li>Node</li>
        </ul>
      </li>
    </ul>
  </section>

  <section>
    <h1>Задание 2</h1>
    <ul id="ingredients"></ul>
  </section>

  <section>
    <h1>Задание 3</h1>
    <ul id="gallery" class="gallery"></ul>
  </section>

  <section>
    <h1>Задание 4</h1>
    <div id="counter">
      <button type="button" data-action="decrement">-1</button>
      <span id="value">0</span>
      <button type="button" data-action="increment">+1</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
